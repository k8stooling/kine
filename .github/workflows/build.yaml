name: Publish to ghcr.io
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      kine_version:
        description: Kine version to bundle, for example v0.13.0
        required: false
        type: string

permissions:
  packages: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Kine version
        id: kine_version
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "value=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
          elif [ -n "${{ inputs.kine_version }}" ]; then
            echo "value=${{ inputs.kine_version }}" >> "${GITHUB_OUTPUT}"
          else
            echo "value=" >> "${GITHUB_OUTPUT}"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/kine
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Multi-Arch Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            KINE_VERSION=${{ steps.kine_version.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Caching speeds up subsequent builds drastically
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.10.0

      - name: Authenticate with GHCR
        env:
          CR_PAT: ${{ secrets.GITHUB_TOKEN }}  # Default GitHub token
        run: echo "${CR_PAT}" | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Package Helm Chart
        run: |
          cd helm
          APP_VERSION="${{ steps.kine_version.outputs.value }}"
          APP_VERSION="${APP_VERSION#v}"
          if [ -n "${APP_VERSION}" ]; then
            sed -i "s/^appVersion: \"latest\"$/appVersion: \"${APP_VERSION}\"/" Chart.yaml
          fi
          helm package .
          mv *.tgz packaged-chart.tgz

      - name: Push Helm Chart to GHCR
        run: |
          cd helm
          CHART_VERSION=$(helm show chart . | grep 'version:' | awk '{print $2}')
          helm push packaged-chart.tgz oci://ghcr.io/${{ github.repository_owner }}/charts